<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEL DWSS - Safety Inspection Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/theme-config.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><div class="logo-icon"><i class="fas fa-water"></i></div><h2>AEL DWSS</h2></div>
        <button class="toggle-btn"><i class="fas fa-chevron-left"></i></button>
        <ul class="menu">
            <li><a href="index.html"><i class="fas fa-home"></i><span class="menu-text">Dashboard</span></a></li>
            <li><a href="sitediary.html"><i class="fas fa-book"></i><span class="menu-text">Site Diary</span></a></li>
            <li><a href="safetyinspect.html"><i class="fas fa-clipboard-check"></i><span class="menu-text">Safety Inspection</span></a></li>
            <li><a href="sitelocations.html"><i class="fas fa-map-marked-alt"></i><span class="menu-text">Site Locations</span></a></li>
            <li><a href="labourwage.html"><i class="fas fa-money-bill-wave"></i><span class="menu-text">Labour Wage</span></a></li>
            <li><a href="settings.html"><i class="fas fa-cogs"></i><span class="menu-text">System Settings</span></a></li>
            <li><a href="usermanagement.html"><i class="fas fa-user-circle"></i><span class="menu-text">User Management</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 data-i18n="safety.inspection">Safety Inspection</h1>
            <div class="header-controls">
                <div class="user-date-row">
                    <div class="date-display"><i class="fas fa-calendar-alt"></i><span id="current-date"></span></div>
                    <button class="user-btn"><i class="fas fa-user"></i><span>John Doe</span></button>
                </div>
            </div>
        </div>

        <div class="document-view-page">
            <div class="document-header">
                <h2><i class="fas fa-file-alt"></i> <span id="docTitle">Safety Inspection Document</span> <span class="doc-status" id="docStatus"></span></h2>
                <div class="document-actions">
                    <button class="btn" id="export-pdf-btn"><i class="fas fa-file-pdf"></i> Export PDF</button>
                    <button class="btn" id="print-btn"><i class="fas fa-print"></i> Print</button>
                    <button class="btn" id="back-to-inspection-btn"><i class="fas fa-arrow-left"></i> Back to Inspection</button>
                </div>
            </div>
            <div class="document-meta">
                <div class="meta-item"><span class="meta-label">Document ID:</span><span class="meta-value" id="docId">N/A</span></div>
                <div class="meta-item"><span class="meta-label">Site:</span><span class="meta-value" id="docSite">N/A</span></div>
                <div class="meta-item"><span class="meta-label">Date:</span><span class="meta-value" id="docDate">N/A</span></div>
                <div class="meta-item"><span class="meta-label">Inspector:</span><span class="meta-value" id="docInspector">N/A</span></div>
            </div>
            <div class="pdf-viewer-container">
                <iframe id="pdf-viewer" src="" width="100%" height="600px" style="border:1px solid #ddd;"></iframe>
                <div class="no-pdf-message" id="no-pdf-message" style="display:none;">
                    <i class="fas fa-file-pdf" style="font-size:48px;color:#ccc;"></i>
                    <p>No PDF document available for this inspection record</p>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/language.js"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/safetyinspectdocument.js"></script>
    <script>
        (function() {
            function saveSidebarState() {
                const sidebar = document.querySelector('.sidebar');
                if (sidebar) localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed') ? 'true' : 'false');
            }
            function restoreSidebarState() {
                const sidebar = document.querySelector('.sidebar');
                if (sidebar && localStorage.getItem('sidebarCollapsed') === 'true') sidebar.classList.add('collapsed');
            }
            function bindToggleEvent() {
                const toggle = document.querySelector('.toggle-btn');
                if (toggle) toggle.addEventListener('click', () => setTimeout(saveSidebarState, 50));
            }
            document.addEventListener('DOMContentLoaded', () => { restoreSidebarState(); bindToggleEvent(); });
        })();
    </script>
</body>
</html>
